name: "Secret Probe Local Action"
description: "Probe whether selected secret/token variables are visible inside a local composite action."

inputs:
  demo-secret:
    description: "A normal secret explicitly passed as an action input."
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Probe inside local composite action
      shell: bash
      env:
        ACTION_SECRET_INPUT: ${{ inputs.demo-secret }}
        TOKEN_FROM_CONTEXT: ${{ github.token }}
      run: |
        bash ./scripts/probe-secret.sh "inside local composite action"
