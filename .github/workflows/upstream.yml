name: Upstream Workflow

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issues:
    types: [opened]
  issue_comment:
    types: [created]

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Show trigger info
        run: |
          echo "Triggered by event: ${{ github.event_name }}"
          echo "PR/Issue number: ${{ github.event.number || github.event.issue.number }}"
          echo "Comment body: ${{ github.event.comment.body }}"

      - name: Create artifact with timestamp
        run: |
          echo "timestamp=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" > context.txt
          echo "event=${{ github.event_name }}" >> context.txt
          echo "repo=${{ github.repository }}" >> context.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: upstream-context
          path: context.txt
          retention-days: 1
