name: Upstream Workflow

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issues:
    types: [opened]
  issue_comment:
    types: [created]

permissions:
  actions: write   # 必须，才能触发 workflow_dispatch

jobs:
  trigger_downstream:
    runs-on: ubuntu-latest
    steps:
      - name: Show trigger event
        run: |
          echo "Triggered by: ${{ github.event_name }}"
          echo "PR/Issue number: ${{ github.event.number || github.event.issue.number }}"

      - name: Trigger workflow_dispatch downstream via API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          # 触发 downstream-dispatch.yml 的 workflow_dispatch 事件
          gh api repos/$REPO/actions/workflows/downstream-dispatch.yml/dispatches \
            --method POST \
            --field ref="${{ github.ref_name }}" \
            --field inputs='{"triggered_by":"${{ github.event_name }}"}'
