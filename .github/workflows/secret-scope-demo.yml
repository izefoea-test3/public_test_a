name: Secret Scope Demo

on:
  workflow_dispatch:

jobs:
  step_scope_demo:
    name: Step-level secret scope demo
    runs-on: ubuntu-latest

    # 这里故意给一个明确的job级GITHUB_TOKEN权限。
    # 普通secret和GITHUB_TOKEN的传播规则不同。
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # 避免actions/checkout把GITHUB_TOKEN持久化到.git/config里，
          # 否则本地脚本可能通过git credential路径间接使用token，干扰观察。
          persist-credentials: false

      - name: 1. Script without any secret env
        run: bash ./scripts/probe-secret.sh "script / no env"

      - name: 2. Local action without secret input/env
        uses: ./.github/actions/probe

      - name: 3. Script with step-level secret env
        env:
          DEMO_SECRET: ${{ secrets.DEMO_SECRET }}
        run: bash ./scripts/probe-secret.sh "script / step-level env"

      - name: 4. Script after previous step-level env
        run: bash ./scripts/probe-secret.sh "script / after step-level env"

      - name: 5. Local action with secret passed as input
        uses: ./.github/actions/probe
        with:
          demo-secret: ${{ secrets.DEMO_SECRET }}

      - name: 6. Script after action input
        run: bash ./scripts/probe-secret.sh "script / after action input"

      - name: 7. Local action with secret passed as step env
        uses: ./.github/actions/probe
        env:
          ACTION_SECRET_ENV: ${{ secrets.DEMO_SECRET }}

      - name: 8. Script after action step env
        run: bash ./scripts/probe-secret.sh "script / after action env"

      - name: 9. Export secret to later steps through GITHUB_ENV
        run: |
          echo "FROM_GITHUB_ENV=${{ secrets.DEMO_SECRET }}" >> "$GITHUB_ENV"
          echo "FROM_GITHUB_ENV was written for later steps"

      - name: 10. Script after GITHUB_ENV export
        run: bash ./scripts/probe-secret.sh "script / after GITHUB_ENV"

      - name: 11. Local action after GITHUB_ENV export
        uses: ./.github/actions/probe

      - name: 12. Script with GITHUB_TOKEN explicitly passed
        env:
          TOKEN_FROM_CONTEXT: ${{ github.token }}
        run: bash ./scripts/probe-secret.sh "script / github.token explicitly passed"

  job_env_demo:
    name: Job-level env secret demo
    runs-on: ubuntu-latest

    permissions:
      contents: read

    # job级env会分发给这个job里的所有step。
    env:
      JOB_LEVEL_SECRET: ${{ secrets.DEMO_SECRET }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: 13. Script sees job-level env
        run: bash ./scripts/probe-secret.sh "script / job-level env"

      - name: 14. Local action sees job-level env
        uses: ./.github/actions/probe
