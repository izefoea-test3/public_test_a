name: Manual Workflow with Secret

on:
  workflow_dispatch:

jobs:
  example-job:
    runs-on: ubuntu-latest
    steps:
      - name: Use a secret
        run: |
          echo "Using secret..."
          # 使用自定义 secret（例如 MY_SECRET）
          echo "The secret length is ${{ secrets.MY_SECRET != '' && 'set' || 'not set' }}"
        env:
          MY_SECRET: ${{ secrets.MY_SECRET }}

      - name: Echo something
        run: echo "Hello, this is the second step!"
